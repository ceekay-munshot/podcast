name: Weekly digest

# Sends the Munshot weekly brief to all subscribers every Monday. Cloudflare Pages
# can't run cron itself, so this scheduled workflow POSTs the deployed
# /api/cron/weekly-digest endpoint, which builds the shared edition and mails
# every subscriber.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SITE_URL     — the deployed site origin, e.g. https://podcast.pages.dev
#   CRON_SECRET  — the same value bound as the CRON_SECRET env var on the Pages
#                  project (Settings → Functions/Variables). Guards the endpoint.
#
# The Pages project ALSO needs MUNSHOT_EMAIL_TOKEN set (a service token for the
# raw-email endpoint) — a cron has no user session to authenticate the send with.

on:
  schedule:
    - cron: '0 13 * * 1' # Mondays 13:00 UTC
  workflow_dispatch: {} # allow a manual run from the Actions tab

# Don't let two runs overlap (e.g. a manual run during the scheduled one).
concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the weekly digest
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::SITE_URL and CRON_SECRET repository secrets must be set."
            exit 1
          fi
          code=$(curl -sS -o /tmp/digest.json -w '%{http_code}' \
            -X POST "${SITE_URL%/}/api/cron/weekly-digest" \
            -H "authorization: Bearer ${CRON_SECRET}" \
            --max-time 120)
          echo "HTTP ${code}"
          cat /tmp/digest.json || true
          echo
          # Surface a non-2xx as a failed run so the schedule is visibly broken if it breaks.
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::weekly-digest endpoint returned HTTP ${code}"
            exit 1
          fi
